<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phone Auth Firebase</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f172a;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      width:350px;
      background:#1e293b;
      padding:25px;
      border-radius:18px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
      outline:none;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#1d4ed8;
    }

    #otpSection{
      display:none;
      margin-top:15px;
    }

    .success{
      color:#22c55e;
      text-align:center;
      margin-top:10px;
    }

    .error{
      color:#ef4444;
      text-align:center;
      margin-top:10px;
    }

    #recaptcha-container{
      margin-top:15px;
      display:flex;
      justify-content:center;
    }
  </style>
</head>
<body>

  <div class="container">

    <h2>Phone Verification</h2>

    <input 
      type="text" 
      id="phoneNumber" 
      placeholder="+91 9876543210"
    />

    <button onclick="sendOTP()">
      Send OTP
    </button>

    <div id="recaptcha-container"></div>

    <div id="otpSection">
      <input 
        type="text" 
        id="otp" 
        placeholder="Enter OTP"
      />

      <button onclick="verifyOTP()">
        Verify OTP
      </button>
    </div>

    <div id="message"></div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
      authDomain: "question-metabase.firebaseapp.com",
      databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "question-metabase",
      storageBucket: "question-metabase.firebasestorage.app",
      messagingSenderId: "770698198753",
      appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
      measurementId: "G-6ZP1FPMKSJ"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    // Setup Recaptcha
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
      'recaptcha-container',
      {
        size: 'normal',
        callback: () => {
          console.log("Recaptcha Verified");
        }
      }
    );

    recaptchaVerifier.render();

    // Send OTP
    function sendOTP(){

      const phoneNumber = document.getElementById("phoneNumber").value;

      auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
      .then((confirmationResult) => {

        window.confirmationResult = confirmationResult;

        document.getElementById("otpSection").style.display = "block";

        document.getElementById("message").innerHTML =
          '<div class="success">OTP Sent Successfully</div>';

      })
      .catch((error) => {

        document.getElementById("message").innerHTML =
          '<div class="error">'+ error.message +'</div>';

      });

    }

    // Verify OTP
    function verifyOTP(){

      const code = document.getElementById("otp").value;

      confirmationResult.confirm(code)
      .then((result) => {

        const user = result.user;

        document.getElementById("message").innerHTML =
          '<div class="success">Phone Verified Successfully</div>';

        console.log(user);

      })
      .catch((error) => {

        document.getElementById("message").innerHTML =
          '<div class="error">Invalid OTP</div>';

      });

    }

  </script>

</body>
</html>
