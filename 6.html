<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            display: none; /* Hidden by default until Firebase loads */
        }

        #loading-screen {
            display: block;
            font-size: 18px;
            color: #666;
        }

        .icon {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: serif; /* Matches the Perplexity style in your image */
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: normal;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Email Input Styles */
        input[type="email"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        /* OTP Box Styles */
        .otp-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            background-color: #fafafa;
        }

        .otp-input:focus {
            outline: none;
            border-color: #333;
        }

        /* Button Styles */
        button {
            width: 100%;
            padding: 14px;
            background-color: #999590;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #7a7672;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Yr9MutUoHOEONnFgn");
        })();
    </script>
</head>
<body>

    <!-- Loading Screen while checking Firebase -->
    <div id="loading-screen" class="container">
        Processing your request... Please wait.
    </div>

    <!-- Step 1: Ask for Parental Email (Only for Kids) -->
    <div id="email-section" class="container">
        <h1>Parental Consent</h1>
        <p>Please enter a parent or guardian's email address to continue.</p>
        <input type="email" id="parent-email" placeholder="Enter parent's email" required>
        <button id="send-email-btn" onclick="sendOTP()">Send One-Time Password</button>
    </div>

    <!-- Step 2: Verify OTP (Only for Kids) -->
    <div id="otp-section" class="container">
        <!-- SVG matching the paper plane icon in your image roughly -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4l3 3"></path>
            <path d="M15 9l-6 6"></path>
        </svg>
        
        <h1>Check your email</h1>
        <p>A temporary sign-in link/OTP has been sent to <br> <strong id="display-email"></strong></p>
        
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
        </div>
        
        <button onclick="verifyOTP()">Confirm</button>
    </div>

    <!-- Firebase Initialization and Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        // Global variables for OTP logic
        window.generatedOTP = "";
        window.dbDocRef = null;
        window.currentSessionId = sessionId;

        async function processUser() {
            if (!sessionId) {
                document.getElementById('loading-screen').innerText = "Error: No session ID found in URL.";
                return;
            }

            window.dbDocRef = doc(db, "ASPX Keys", sessionId);

            try {
                const docSnap = await getDoc(window.dbDocRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const userType = data.type; 

                    if (userType === 'personal') {
                        // Update family=no and redirect
                        await updateDoc(window.dbDocRef, { family: "no" });
                        window.location.href = `7.html?session=${sessionId}`;

                    } else if (userType === 'busniess' || userType === 'business') {
                        // Update family=workspace and redirect
                        await updateDoc(window.dbDocRef, { family: "workspace" });
                        window.location.href = `7.html?session=${sessionId}`;

                    } else if (userType === 'kids') {
                        // Show Email Input UI for kids
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('email-section').style.display = 'block';
                    } else {
                        document.getElementById('loading-screen').innerText = "Unknown account type.";
                    }
                } else {
                    document.getElementById('loading-screen').innerText = "Error: Session document not found in Database.";
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                document.getElementById('loading-screen').innerText = "Error connecting to database.";
            }
        }

        // Run on page load
        processUser();

        // --- EXPORTING FIRESTORE FUNCTIONS TO GLOBAL WINDOW FOR INLINE HTML CALLS ---
        window.updateKidsDatabase = async function() {
            try {
                await updateDoc(window.dbDocRef, { family: "commited" }); // Using 'commited' as requested
                window.location.href = `7.html?session=${window.currentSessionId}`;
            } catch(e) {
                console.error("Error updating doc", e);
                alert("Failed to update database.");
            }
        }
    </script>

    <!-- EmailJS & OTP UI Logic -->
    <script>
        // Move focus to next OTP box automatically
        function moveToNext(current, event) {
            if (current.value.length === 1) {
                let next = current.nextElementSibling;
                if (next) next.focus();
            }
            if (event.key === "Backspace") {
                let prev = current.previousElementSibling;
                if (prev) prev.focus();
            }
        }

        // Send OTP via EmailJS
        function sendOTP() {
            const emailInput = document.getElementById('parent-email').value;
            const btn = document.getElementById('send-email-btn');

            if (!emailInput.includes('@')) {
                alert("Please enter a valid email.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";

            // Generate 6 digit OTP
            window.generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            // Set parameters exactly as your EmailJS template expects them
            const templateParams = {
                to_email: emailInput,
                otp: window.generatedOTP 
            };

            emailjs.send('service_1ij08zn', 'template_kxe5gjg', templateParams)
                .then(function(response) {
                    // Hide email section, show OTP section
                    document.getElementById('email-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    document.getElementById('display-email').innerText = emailInput;
                }, function(error) {
                    console.log('FAILED...', error);
                    alert("Failed to send OTP. Check console for details.");
                    btn.disabled = false;
                    btn.innerText = "Send One-Time Password";
                });
        }

        // Verify OTP entered by user
        function verifyOTP() {
            let enteredOTP = "";
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach(input => enteredOTP += input.value);

            if (enteredOTP === window.generatedOTP) {
                // Call the globally exposed Firebase function
                window.updateKidsDatabase();
            } else {
                alert("Incorrect OTP. Please try again.");
                // clear inputs
                inputs.forEach(input => input.value = '');
                inputs[0].focus();
            }
        }
    </script>
</body>
</html>
